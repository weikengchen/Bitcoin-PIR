# Enable AES-NI and adjacent SSE/PCLMUL features on x86_64 so that intrinsic
# calls in dependencies like alf-nt (used by HarmonyPIR's PRP backend) inline
# the AES round instructions instead of going through one out-of-line
# function call per `_mm_aesenc_si128`. Without this, ALF's `Ktm::tweak_init`
# generates 48 `call _mm_aesenc_si128` sites in the release binary because
# the dep's own `.cargo/config.toml` is not propagated when it is consumed
# as a git dependency.
#
# Target gate is `cfg(target_arch = "x86_64")` so wasm32 and aarch64 builds
# are unaffected (those backends have their own intrinsic paths).

[target.'cfg(target_arch = "x86_64")']
rustflags = ["-C", "target-feature=+aes,+ssse3,+sse4.1,+pclmulqdq"]

# ─── Vendored deps ─────────────────────────────────────────────────────────
# All crates.io + git deps are mirrored in ./vendor/ via `cargo vendor`
# (sub-task 4 of docs/PHASE3_SLICE3_REPRO_PLAN.md). This pins exact source
# bytes for reproducibility and lets `cargo build --offline` succeed
# without network access. Re-run `cargo vendor` whenever Cargo.lock changes.

[source.crates-io]
replace-with = "vendored-sources"

[source."git+https://github.com/Bitcoin-PIR/ALF.git?rev=e2e0b3d6a231f2a3491d07a4facbf69d4e5ae607"]
git = "https://github.com/Bitcoin-PIR/ALF.git"
rev = "e2e0b3d6a231f2a3491d07a4facbf69d4e5ae607"
replace-with = "vendored-sources"

# OnionPIRv2-fork is intentionally NOT vendored. Its build.rs assumes the
# OnionPIR fork's full repo layout (top-level CMakeLists.txt + extern/SEAL
# git submodule sibling to the onionpir subcrate), but `cargo vendor`
# flattens git deps to just the consumed subcrate, leaving build.rs
# unable to find SEAL or the top-level CMake config. Cargo fetches this
# from github at build time instead — the rev pin in Cargo.lock keeps
# the source bytes deterministic; only the offline-build property of
# sub-task 4 is sacrificed for this one dep. Fixing this requires either
# upstream restructuring of the fork (move CMakeLists.txt + extern/ inside
# onionpir/) or a hermetic build env (sub-task 5).

[source."git+https://github.com/Bitcoin-PIR/fastprp.git?rev=eaf1ee787c051c1250329cbe645c157e085af6e2"]
git = "https://github.com/Bitcoin-PIR/fastprp.git"
rev = "eaf1ee787c051c1250329cbe645c157e085af6e2"
replace-with = "vendored-sources"

[source."git+https://github.com/Bitcoin-PIR/harmonypir.git?rev=60635d8e526629b2ba99ec5020a55d078a299660"]
git = "https://github.com/Bitcoin-PIR/harmonypir.git"
rev = "60635d8e526629b2ba99ec5020a55d078a299660"
replace-with = "vendored-sources"

[source."git+https://github.com/weikengchen/libdpf.git"]
git = "https://github.com/weikengchen/libdpf.git"
replace-with = "vendored-sources"

[source."git+https://github.com/Bitcoin-PIR/arc.git?rev=de6c1709eee0faa32985d5a452be11904ee95de4"]
git = "https://github.com/Bitcoin-PIR/arc.git"
rev = "de6c1709eee0faa32985d5a452be11904ee95de4"
replace-with = "vendored-sources"

[source.vendored-sources]
directory = "vendor"

# ─── Reproducible-build env ────────────────────────────────────────────────
# Sub-task 2 of docs/PHASE3_SLICE3_REPRO_PLAN.md. SOURCE_DATE_EPOCH=0 makes
# any timestamp-embedding build.rs scripts use 1970-01-01 instead of the
# current wall clock. force=true overrides any operator-set SDE so the
# value is consistent regardless of shell environment.
#
# --remap-path-prefix is NOT in this file — it depends on $PWD/$HOME at
# build time and TOML can't interpolate. Use scripts/build_unified_server.sh
# which sets RUSTFLAGS dynamically before invoking cargo build.

[env]
SOURCE_DATE_EPOCH = { value = "0", force = true }
