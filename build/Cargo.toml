[package]
name = "build"
version = "0.1.0"
edition = "2021"

# ─── Essential pipeline (required for server/client) ─────────────────────────
# Run in order: gen_0 → gen_1 → gen_2 → gen_3

[[bin]]
name = "gen_0_extract_utxo_set"
path = "src/gen_0_utxo_set.rs"

[[bin]]
name = "gen_1_build_utxo_chunks"
path = "src/build_utxo_chunks.rs"

[[bin]]
name = "gen_2_build_chunk_cuckoo"
path = "src/build_chunk_cuckoo.rs"

[[bin]]
name = "gen_3_build_index_cuckoo"
path = "src/main.rs"

# ─── Test/diagnostic tools (not required for operation) ──────────────────────
# test_0*: stats tools (no dependencies beyond gen_1 output)
# test_1-2: verification (run after gen_2/gen_3 respectively)
# test_3 → test_4 → test_5 → test_6 → test_7: end-to-end PIR test chain
# test_8: diagnostic (depends on test_5 output)

[[bin]]
name = "test_0a_utxo_stats"
path = "src/utxo_stats.rs"

[[bin]]
name = "test_0b_index_stats"
path = "src/index_stats.rs"

[[bin]]
name = "test_1_verify_chunk_cuckoo"
path = "src/verify_chunk_cuckoo.rs"

[[bin]]
name = "test_2_verify_index_cuckoo"
path = "src/verify.rs"

[[bin]]
name = "test_3_extract_test_queries"
path = "src/extract_test_queries.rs"

[[bin]]
name = "test_4_assign_queries"
path = "src/assign_queries.rs"

[[bin]]
name = "test_5_test_index_pir"
path = "src/test_batch_pir.rs"

[[bin]]
name = "test_6_plan_chunk_rounds"
path = "src/plan_chunk_rounds.rs"

[[bin]]
name = "test_7_test_chunk_pir"
path = "src/test_chunk_pir_batched.rs"

[[bin]]
name = "test_8_assign_chunk_queries"
path = "src/assign_chunk_queries.rs"

[[bin]]
name = "append_whale_sentinels"
path = "src/append_whale_sentinels.rs"

[[bin]]
name = "chunk_size_analysis"
path = "src/chunk_size_analysis.rs"

[[bin]]
name = "find_whale_spks"
path = "src/find_whale_spks.rs"

[[bin]]
name = "cuckoo4_experiment"
path = "src/cuckoo4_experiment.rs"

[[bin]]
name = "test_onion_cuckoo"
path = "src/test_onion_cuckoo.rs"

[[bin]]
name = "gen_1_onion"
path = "src/gen_1_onion.rs"

[[bin]]
name = "gen_2_onion"
path = "src/gen_2_onion.rs"

[[bin]]
name = "gen_3_onion"
path = "src/gen_3_onion.rs"

# ─── Delta database pipeline ────────────────────────────────────────────────

[[bin]]
name = "delta_gen_0"
path = "src/delta_gen_0_compute_delta.rs"

[[bin]]
name = "delta_gen_1"
path = "src/delta_gen_1_build_chunks.rs"

[[bin]]
name = "build_cuckoo_generic"
path = "src/build_cuckoo_generic.rs"

[[bin]]
name = "gen_4_build_merkle"
path = "src/gen_4_build_merkle.rs"

[[bin]]
name = "gen_4_build_merkle_dpf"
path = "src/gen_4_build_merkle_dpf.rs"

[[bin]]
name = "gen_4_build_merkle_onion"
path = "src/gen_4_build_merkle_onion.rs"

[[bin]]
name = "gen_4_build_merkle_bucket"
path = "src/gen_4_build_merkle_bucket.rs"

[[bin]]
name = "test_merkle_verify"
path = "src/test_merkle_verify.rs"

[[bin]]
name = "test_merkle_verify_n"
path = "src/test_merkle_verify_n.rs"

[[bin]]
name = "test_merkle_verify_onion"
path = "src/test_merkle_verify_onion.rs"

[[bin]]
name = "test_pir_core_crosscheck"
path = "src/test_pir_core_crosscheck.rs"

[dependencies]
pir-core = { path = "../pir-core" }
bitcoin = "0.32.7"
txoutset = "0.4"
memmap2 = "0.9"
rayon = "1.10"
libdpf = { git = "https://github.com/weikengchen/libdpf.git" }
onionpir = { git = "https://github.com/Bitcoin-PIR/OnionPIRv2-fork.git" }
brk_reader = "0.2"
brk_rpc = "0.2"
