name: PIR SDK Integration Tests

# Runs the `pir-sdk-client` integration suite against the public PIR
# deployment (wss://pir1.chenweikeng.com / wss://pir2.chenweikeng.com).
# These are the same servers the web client at
# https://chenweikeng.com/bitcoin-pir uses, so a failure here would
# typically also break the web client — the workflow is our early-warning
# signal for SDK vs. production-server protocol drift.
#
# The tests are marked `#[ignore]` in the test binary and must be opted
# into with `-- --ignored`. Running them sequentially (`--test-threads=1`)
# keeps TLS handshakes from stepping on each other and keeps the fresh-sync
# chunk-batch traffic under the Cloudflare connection limit.

on:
  push:
    branches: [main]
    paths:
      - 'pir-sdk/**'
      - 'pir-sdk-client/**'
      - 'pir-core/**'
      - 'harmonypir-wasm/**'
      - '.github/workflows/pir-sdk-integration.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pir-sdk/**'
      - 'pir-sdk-client/**'
      - 'pir-core/**'
      - 'harmonypir-wasm/**'
      - '.github/workflows/pir-sdk-integration.yml'
  workflow_dispatch:
  # Daily canary — catches breakage from server-side protocol changes
  # even when no SDK PRs land. 06:17 UTC = off-peak for the servers.
  schedule:
    - cron: '17 6 * * *'

permissions:
  contents: read

jobs:
  integration:
    name: pir-sdk-client integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CARGO_TERM_COLOR: always
      # Pin the default URLs explicitly so the CI log shows what we
      # tested against. Override via repository variables or a fork's
      # env block to hit a different deployment.
      PIR_DPF_SERVER0_URL: wss://pir1.chenweikeng.com
      PIR_DPF_SERVER1_URL: wss://pir2.chenweikeng.com
      PIR_HARMONY_HINT_URL: wss://pir2.chenweikeng.com
      PIR_HARMONY_QUERY_URL: wss://pir1.chenweikeng.com

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-sdk-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-sdk-

      - name: Build pir-sdk-client (library + tests)
        run: cargo build -p pir-sdk-client --tests

      # --test-threads=1 serializes connections. The live servers are
      # fine under parallel load from real clients, but a burst of
      # simultaneous handshakes from a single runner IP can briefly
      # trip rate limits and surface as "Handshake not finished" errors.
      - name: Run unit tests
        run: cargo test -p pir-sdk-client
      - name: Run ignored integration tests against live PIR servers
        run: cargo test -p pir-sdk-client --test integration_test -- --ignored --test-threads=1 --nocapture

  integration-onion:
    # OnionPIR tests live in their own job because the `onion` feature
    # pulls in the `onionpir` crate, which builds SEAL + libonionpir from
    # source via CMake + GCC — a slow, ~5–10 minute compile. Running it
    # separately keeps the DPF/Harmony smoke tests fast on PRs while still
    # giving us end-to-end OnionPIR coverage.
    name: pir-sdk-client OnionPIR integration tests
    # Pinned to ubuntu-22.04 (GCC 11) instead of ubuntu-latest (GCC 13).
    # Intel HEXL's CMake auto-detects AVX512 from /proc/cpuinfo on the
    # runner host and enables AVX512 codegen, but on GCC 13 the per-
    # translation-unit target-attribute scoping is inconsistent — non-
    # AVX512 .cpp files include AVX512-flagged headers marked
    # `always_inline`, and GCC 13 errors out with
    #   "inlining failed in call to 'always_inline' '__m512i
    #    _mm512_add_epi64(...)': target specific option mismatch"
    # This fires any time the Cargo cache is cold (e.g. after a
    # Cargo.lock hash shift) and HEXL rebuilds from scratch. GCC 11 on
    # ubuntu-22.04 doesn't hit this. The upstream onionpir build.rs
    # hardcodes -DUSE_HEXL=ON on Linux x86_64 with no env-var escape
    # and explicitly wipes CXXFLAGS, so workflow-level flag injection
    # doesn't help. Revisit once the fork exposes a
    # ONIONPIR_DISABLE_HEXL env var (tracked separately).
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    env:
      CARGO_TERM_COLOR: always
      PIR_ONION_URL: wss://pir1.chenweikeng.com
      # The SEAL submodule is declared with an SSH URL
      # (git@github.com:…) in the `OnionPIRv2-fork` repo. Cargo's
      # libgit2-based fetcher won't authenticate as us on GitHub, so
      # force Cargo to shell out to the git CLI, which then honors the
      # `insteadOf` rewrite we install below.
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install C++ toolchain
        # ubuntu-latest already ships with gcc/g++/cmake, but we pin the
        # install step explicitly so the workflow stays reproducible if
        # GitHub's image ever trims them. libgomp is linked dynamically
        # by libonionpir for OpenMP.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake libgomp1

      - name: Rewrite SSH GitHub URLs to HTTPS (for SEAL submodule)
        # The `onionpir` crate we depend on has a SEAL submodule whose
        # URL is `git@github.com:Bitcoin-PIR/SEAL-For-OnionPIR-fork.git`.
        # CI runners don't have SSH access to GitHub, so rewrite all
        # `git@github.com:` URLs to `https://github.com/` before Cargo
        # does its recursive submodule update.
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # Separate cache key from the main integration job — the
          # `onion` feature produces a completely different target
          # directory (libonionpir.a, libseal-4.1.a, C++ object files).
          key: ${{ runner.os }}-cargo-sdk-onion-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-sdk-onion-

      - name: Build pir-sdk-client with --features onion (library + tests)
        run: cargo build -p pir-sdk-client --features onion --tests

      - name: Run unit tests with --features onion
        run: cargo test -p pir-sdk-client --features onion

      - name: Run ignored OnionPIR integration tests against live PIR servers
        # The `onion_tests` filter scopes this to the OnionPIR module
        # introduced in integration_test.rs — the DPF / Harmony tests
        # already ran in the `integration` job without the feature.
        # (Quoted to keep YAML from parsing `::` as a mapping.)
        run: "cargo test -p pir-sdk-client --features onion --test integration_test -- --ignored --test-threads=1 --nocapture onion_tests::"
